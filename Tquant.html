<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tquant 量化工作站 | 策略回测 + K线买卖点</title>
    <!-- ECharts 核心库 -->
    <script src="echarts.min.js"></script>
    <!-- QWebChannel -->
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, '微软雅黑', sans-serif;
            background: #0e1118;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }

        .app-window {
            width: 1480px;
            max-width: 96vw;
            height: 92vh;
            background: #11141f;
            border-radius: 20px;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #2a2f42;
        }

        .title-bar {
            background: #0c0f18;
            padding: 10px 24px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid #202436;
        }
        .logo-text {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
        }
        .logo-text span {
            color: #5f8eff;
        }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .nav-sidebar {
            width: 210px;
            background: #0a0d16;
            border-right: 1px solid #202436;
            display: flex;
            flex-direction: column;
            padding: 20px 10px;
            gap: 6px;
            overflow-y: auto;
        }
        .nav-item {
            padding: 10px 14px;
            border-radius: 12px;
            color: #ffffff;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-item:hover {
            background: #1a2135;
            color: #ffffff;
        }
        .nav-item.active {
            background: #2c3e66;
            color: #ffffff;
        }
        .nav-item .avatar-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background: #2c3e66;
            display: inline-flex;
            align-items: center;
            justify-content: center;

            overflow: hidden;
            flex-shrink: 0;
        }
        .nav-item .avatar-icon img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .content-panel {
            flex: 1;
            background: #0f1220;
            overflow-y: auto;
            padding: 20px 24px;
            color: #ffffff;
        }

        .card {
            background: #151c2c;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #242a40;
            color: #ffffff;
        }
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            border-left: 4px solid #4f7eff;
            padding-left: 14px;
            margin-bottom: 18px;
        }

        .kline-container {
            width: 100%;
            height: 460px !important;
            min-height: 460px;
            flex-shrink: 0;
            background: #0e1220;
            border-radius: 20px;
            margin: 10px 0;
        }

        .legend-sign {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin: 12px 0;
            font-size: 13px;
            color: #ffffff;
        }
        .buy-point {
            display: inline-block;
            width: 14px;
            height: 14px;
            background: #ff4d4f;
            border-radius: 50%;
            margin-right: 4px;
        }
        .sell-point {
            display: inline-block;
            width: 14px;
            height: 14px;
            background: #52c41a;
            border-radius: 50%;
            margin-right: 4px;
        }

        .metric-row {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin: 16px 0;
            align-items: center;
            min-width: 0;
        }
        .metric-row select,
        .metric-row input[type="date"] {
            flex: 0 0 auto;
            min-width: 0;
            width: auto;
            max-width: 150px;
            height: 34px;
            box-sizing: border-box;
            line-height: normal;
        }
        .metric-row > * {
            flex-shrink: 0;
        }
        select option {
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .metric-tag {
            background: #1f273f;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            color: #ffffff;
        }
        .profit-positive { color: #ff4d4f !important; }
        .profit-negative { color: #52c41a !important; }

        button {
            background: #2d3a5e;
            border: none;
            padding: 6px 18px;
            border-radius: 30px;
            color: #ffffff;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: #3f5080;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            color: #ffffff;
        }
        th, td {
            padding: 10px 6px;
            text-align: left;
            border-bottom: 1px solid #2a314a;
            color: #ffffff;
        }
        th {
            color: #ffffff;
            font-weight: 500;
        }
        .code-area {
            background: #0b0e1a;
            font-family: 'Fira Code', monospace;
            padding: 16px;
            border-radius: 16px;
            white-space: pre-wrap;
            font-size: 13px;
            color: #ffffff;
        }
        textarea {
            width: 100%;
            background: #0b0e1a;
            border: 1px solid #2a3145;
            border-radius: 16px;
            color: #ffffff;
            font-family: 'Fira Code', monospace;
            padding: 14px;
            font-size: 13px;
            resize: vertical;
        }
        .log-box {
            background: #0c0f18;
            border-radius: 16px;
            padding: 12px;
            height: 130px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            margin-top: 12px;
            color: #ffffff;
        }
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #1a2130;
        }
        ::-webkit-scrollbar-thumb {
            background: #3f4a6b;
        }

        .profile-avatar-upload {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .profile-avatar-upload .preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #4f7eff;
            overflow: hidden;
            background: #2a3145;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        .profile-avatar-upload .preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .account-cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .account-card {
            background: #1a2135;
            border-radius: 16px;
            padding: 20px;
            flex: 1;
            min-width: 160px;
            text-align: center;
            border: 1px solid #2a314a;
        }
        .account-card .value {
            font-size: 24px;
            font-weight: 600;
            margin-top: 8px;
        }
        .account-card .label {
            font-size: 14px;
            color: #9aa9cc;
        }
        input[type="file"] {
            display: none;
        }
        .file-upload-label {
            background: #2d3a5e;
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
        }
        .trade-input-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin: 12px 0;
        }
        .trade-input-row input, .trade-input-row select {
            background: #1e253b;
            border: 1px solid #323d5a;
            padding: 8px 14px;
            border-radius: 30px;
            color: #ffffff;
            font-size: 13px;
        }
        .stock-code-link {
            cursor: pointer;
            text-decoration: underline;
            color: #5f8eff;
        }
        .stock-code-link:hover {
            color: #8ab4f8;
        }
        /* 个股详情页搜索区 */
        .stock-search-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
        }
        .stock-search-row input {
            background: #1e253b;
            border: 1px solid #323d5a;
            padding: 8px 14px;
            border-radius: 30px;
            color: #ffffff;
            font-size: 13px;
            flex: 1;
        }
        /* ----------  通用 select 宽度限制 ---------- */
        select {
            max-width: 140px;
            flex-shrink: 0;
            height: 34px;
            line-height: 34px;
            box-sizing: border-box;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        /* ----------  可滚动表格容器 ---------- */
        .scrollable-table {
            max-height: 300px;
            overflow-y: auto;
        }
        /* ----------  日期输入框样式 ---------- */
        input[type="date"] {
            background: #1e253b;
            border: 1px solid #323d5a;
            padding: 6px 10px;
            border-radius: 30px;
            color: #ffffff;
            font-size: 13px;
            width: auto;
            min-width: 130px;
            max-width: 160px;
            flex-shrink: 0;
            height: 34px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
<!-- Bridge 状态指示器 (固定在右上角) -->
<div id="bridgeStatus" style="position:fixed; top:10px; right:10px; background:#333; padding:8px 15px; border-radius:8px; z-index:9999; font-size:12px; font-family:monospace; box-shadow:0 2px 8px rgba(0,0,0,0.3);">
    🔌 Bridge: 检测中...
</div>

<div class="app-window">
    <div class="title-bar">
        <div class="logo-text">Tquant <span>量化工作站</span> | 策略回测·K线买卖点</div>
        <div style="font-size:12px; color:#ffffff;">专业回测引擎</div>
    </div>
    <div class="main-layout">
        <div class="nav-sidebar">
            <div class="nav-item" data-page="profile">
                <span class="avatar-icon" id="navAvatarIcon">👤</span>
                个人中心
            </div>
            <div class="nav-item active" data-page="history">📁 历史回测</div>
            <div class="nav-item" data-page="strategy">💻 策略代码</div>
            <div class="nav-item" data-page="detail">📊 策略详情</div>
            <div class="nav-item" data-page="daily">💰 每日持仓&amp;收益</div>
            <div class="nav-item" data-page="kchart">📈 买卖点成交图(K线)</div>
            <div class="nav-item" data-page="stock">📉 个股详情</div>
            <div class="nav-item" data-page="api">📘 API文档</div>
            <div class="nav-item" data-page="settings">⚙️ 设置说明</div>
        </div>

        <div class="content-panel" id="dynamicContent">
            <!-- 动态渲染 -->
        </div>
    </div>
</div>

<script>
    // Bridge 状态更新
    setTimeout(function() {
        var statusDiv = document.getElementById('bridgeStatus');
        if (typeof bridge !== 'undefined' && bridge !== null) {
            statusDiv.innerHTML = '🔌 Bridge: ✅ 已连接';
            statusDiv.style.background = '#1a5a2a';
        } else {
            statusDiv.innerHTML = '🔌 Bridge: ❌ 未连接';
            statusDiv.style.background = '#5a2a2a';
        }
    }, 1000);

    // --------------------------------------------------------------
    // 全局变量 & 通信日志
    // --------------------------------------------------------------
    var bridge = null;
    var klineChart = null;
    var stockChart = null;          // 个股详情页K线图表实例
    var currentStockCode = "000001";
    var buyPoints = [];
    var sellPoints = [];
    var bridgeReady = false;
    var pendingCallbacks = [];
    var autoRunBacktest = false;
    var autoBacktestScheduled = false;  // 自动回测仅触发一次

    function log(msg) {
        console.log("[Tquant]", msg);
    }

    function onBridgeReady(callback) {
        if (bridgeReady && callback) {
            callback();
        } else if (callback) {
            pendingCallbacks.push(callback);
        }
    }

    // --------------------------------------------------------------
    // 建立 QWebChannel
    // --------------------------------------------------------------
    document.addEventListener("DOMContentLoaded", function() {
        if (typeof QWebChannel !== 'undefined' && typeof qt !== 'undefined' && qt.webChannelTransport) {
            new QWebChannel(qt.webChannelTransport, function(channel) {
                bridge = channel.objects.bridge;
                bridgeReady = true;
                log("QWebChannel 已建立，bridge.ping = " + typeof bridge.ping);
                pendingCallbacks.forEach(function(cb) { cb(); });
                pendingCallbacks = [];

                if (typeof bridge.ping === 'function') {
                    bridge.ping().then(function(reply) {
                        log("ping 响应: " + reply);
                    }).catch(function(err) {
                        log("ping 失败: " + err);
                    });
                }

                if (bridge) {
                    // 默认全范围加载
                    fetchAndRenderKline(currentStockCode, "2010-01-01", "2026-12-31");
                }
            });
        } else {
            log("QWebChannel 环境不可用（qt.webChannelTransport 未定义），使用模拟数据。");
        }
    });

    // --------------------------------------------------------------
    // 跳转函数
    // --------------------------------------------------------------
    function navigateToKline(code) {
        currentStockCode = code;
        autoRunBacktest = true;
        document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
        var target = document.querySelector('.nav-item[data-page="kchart"]');
        if (target) target.classList.add('active');
        loadPage('kchart');
    }

    // --------------------------------------------------------------
    // K线数据获取与渲染（含买卖点），支持日期范围
    // --------------------------------------------------------------
    function fetchAndRenderKline(code, startDate, endDate) {
        if (!bridge) {
            log("bridge 未就绪，使用模拟数据");
            var mock = generateMockKline(code);
            currentKlineDates = mock.dates;
            currentKlineValues = mock.values;
            renderKlineWithSignals(mock.dates, mock.values, buyPoints, sellPoints, null);
            // 自动回测（模拟数据也触发）
            if (autoBacktestScheduled) {
                autoBacktestScheduled = false;
                var sd = document.getElementById('startDateInput').value;
                var ed = document.getElementById('endDateInput').value;
                runBacktest(code, sd, ed);
            }
            return;
        }
        log("请求 K线数据: " + code + " 范围 " + startDate + " ~ " + endDate);
        bridge.get_kline_data(code, startDate, endDate).then(function(jsonStr) {
            var data = JSON.parse(jsonStr);
            if (data.error) { log("后端错误: " + data.error); return; }
            // 【修正】兼容处理：如果后端没有直接提供 values，则从 opens/closes/lows/highs 构造
            if (data.dates && !data.values && data.opens && data.highs && data.lows && data.closes) {
                data.values = data.dates.map(function(_, i) {
                    return [data.opens[i], data.closes[i], data.lows[i], data.highs[i]];
                });
            }
            if (!data.dates || !data.values) { log("数据格式错误"); return; }
            currentKlineDates = data.dates;
            currentKlineValues = data.values;
            // 单纯刷新K线时，均线数据为 null（不回传均线）
            renderKlineWithSignals(data.dates, data.values, buyPoints, sellPoints, null);
            // 自动回测（仅在当前页面首次加载时触发）
            if (autoBacktestScheduled) {
                autoBacktestScheduled = false;
                var sd = document.getElementById('startDateInput').value;
                var ed = document.getElementById('endDateInput').value;
                runBacktest(code, sd, ed);
            }
        }).catch(function(err) { log("请求失败: " + err); });
    }

    var currentKlineDates = [];
    var currentKlineValues = [];

    // --------------------------------------------------------------
    // 均线图例格式化辅助函数
    // --------------------------------------------------------------
    function formatMaLegend(maArray, name) {
        // 找出最后一个非零、非空的有效值
        var lastVal = null, prevVal = null;
        for (var i = maArray.length - 1; i >= 0; i--) {
            var v = maArray[i];
            if (v !== 0 && v !== null && !isNaN(v)) {
                if (lastVal === null) {
                    lastVal = v;
                } else if (prevVal === null) {
                    prevVal = v;
                    break;
                }
            }
        }
        if (lastVal === null) return name;
        var arrow = '';
        if (prevVal !== null) {
            arrow = lastVal > prevVal ? '↑' : (lastVal < prevVal ? '↓' : '→');
        }
        return name + ':' + lastVal.toFixed(2) + arrow;
    }

    // --------------------------------------------------------------
    // renderKlineWithSignals —— 支持叠加均线(MA5, MA10, MA20, MA30)
    // 若 maData 非空且与 dates 长度一致，则添加四条折线
    // 新增 extraLines 参数（预留扩展）
    // --------------------------------------------------------------
    function renderKlineWithSignals(dates, values, buyPts, sellPts, maData, extraLines) {
        console.log("=== renderKlineWithSignals 被调用 ===");
        console.log("dates 数量:", dates ? dates.length : 0);
        console.log("values 数量:", values ? values.length : 0);
        console.log("maData:", maData ? "存在" : "无");
        
        var dom = document.getElementById('klineMainChart');
        console.log("klineMainChart 容器:", dom);
        
        if (!dom) {
            console.error('❌ 找不到 klineMainChart 容器');
            return;
        }
        
        // 检查容器尺寸
        var rect = dom.getBoundingClientRect();
        console.log("容器尺寸:", rect.width, "x", rect.height);
        if (rect.width === 0 || rect.height === 0) {
            console.warn("容器尺寸为 0，可能被隐藏");
            dom.style.height = "460px";
            dom.style.width = "100%";
        }
        
        if (typeof echarts === 'undefined') {
            console.error('❌ ECharts 未加载');
            return;
        }
        
        // 先销毁旧实例
        var existingChart = echarts.getInstanceByDom(dom);
        if (existingChart) {
            existingChart.dispose();
            console.log("已销毁旧图表实例");
        }
        
        // 创建新图表
        var chart = echarts.init(dom);
        console.log("ECharts 实例创建成功");
        
        // ----------  构造买入/卖出散点数据 ----------
        var buySeriesData = [];
        var sellSeriesData = [];
        
        if (buyPts && buyPts.length > 0) {
            for (var i = 0; i < buyPts.length; i++) {
                var pt = buyPts[i];
                var idx = dates.indexOf(pt.date);
                if (idx >= 0 && idx < values.length) {
                    var high = values[idx][3];
                    var price = high + 0.05;
                    buySeriesData.push([idx, price]);
                } else {
                    console.warn("买入点日期未找到:", pt.date);
                }
            }
        }
        if (sellPts && sellPts.length > 0) {
            for (var i = 0; i < sellPts.length; i++) {
                var pt = sellPts[i];
                var idx = dates.indexOf(pt.date);
                if (idx >= 0 && idx < values.length) {
                    var low = values[idx][2];
                    var price = low - 0.05;
                    sellSeriesData.push([idx, price]);
                } else {
                    console.warn("卖出点日期未找到:", pt.date);
                }
            }
        }

        // ----------  构造 series ----------
        var series = [
            {
                name: 'K线',
                type: 'candlestick',
                data: values,
                itemStyle: {
                    color: '#ef5350',
                    color0: '#26a69a',
                    borderColor: '#ef5350',
                    borderColor0: '#26a69a'
                }
            },
            {
                name: '买入点',
                type: 'scatter',
                data: buySeriesData,
                symbol: 'triangle',
                symbolSize: 14,
                symbolRotate: 0,
                itemStyle: { color: '#ff0000' },
                label: {
                    show: true,
                    formatter: 'B',
                    color: '#ffffff',
                    fontSize: 10,
                    position: 'top'
                },
                tooltip: { formatter: function(params) { return '买入: ' + dates[params.data[0]]; } }
            },
            {
                name: '卖出点',
                type: 'scatter',
                data: sellSeriesData,
                symbol: 'triangle',
                symbolSize: 14,
                symbolRotate: 180,
                itemStyle: { color: '#00ff00' },
                label: {
                    show: true,
                    formatter: 'S',
                    color: '#ffffff',
                    fontSize: 10,
                    position: 'bottom'
                },
                tooltip: { formatter: function(params) { return '卖出: ' + dates[params.data[0]]; } }
            }
        ];

        // ----------  均线系列 ----------
        var legendData = ['K线', '买入点', '卖出点'];
        if (maData && maData.ma5 && maData.ma5.length === dates.length) {
            // 计算图例显示名称
            var ma5Name = formatMaLegend(maData.ma5, 'MA5');
            var ma10Name = formatMaLegend(maData.ma10, 'MA10');
            var ma20Name = formatMaLegend(maData.ma20, 'MA20');
            var ma30Name = formatMaLegend(maData.ma30, 'MA30');
            // MA5
            series.push({
                name: ma5Name,
                type: 'line',
                data: maData.ma5,
                lineStyle: { width: 1, color: '#f2c94c' },
                smooth: false,
                showSymbol: false
            });
            legendData.push(ma5Name);
            // MA10
            series.push({
                name: ma10Name,
                type: 'line',
                data: maData.ma10,
                lineStyle: { width: 1, color: '#f2994a' },
                showSymbol: false
            });
            legendData.push(ma10Name);
            // MA20
            series.push({
                name: ma20Name,
                type: 'line',
                data: maData.ma20,
                lineStyle: { width: 1, color: '#eb5757' },
                showSymbol: false
            });
            legendData.push(ma20Name);
            // MA30
            series.push({
                name: ma30Name,
                type: 'line',
                data: maData.ma30,
                lineStyle: { width: 1, color: '#6fcf97' },
                showSymbol: false
            });
            legendData.push(ma30Name);
        }

        // 预留 extraLines
        if (extraLines && extraLines.length > 0) {
            for (var ei = 0; ei < extraLines.length; ei++) {
                var extra = extraLines[ei];
                // 假设 extra 包含 {name, data, color} 基本字段
                series.push({
                    name: extra.name,
                    type: 'line',
                    data: extra.data,
                    lineStyle: { width: 1, color: extra.color || '#ffffff' },
                    showSymbol: false
                });
                legendData.push(extra.name);
            }
        }

    // --------------------------------------------------------------
    function renderStockKline(containerId, dates, values) {
        var container = document.getElementById(containerId);
        if (!container) {
            console.error("❌ 渲染个股K线失败：找不到容器", containerId);
            return;
        }
        // 检查尺寸，若高度为0则重试一次（可能容器刚创建）
        var rect = container.getBoundingClientRect();
        if (rect.height === 0) {
            console.warn("个股K线容器高度为0，延迟100ms重试");
            setTimeout(function() {
                renderStockKline(containerId, dates, values);
            }, 100);
            return;
        }
        var fixedValues = [];
        for (var i = 0; i < values.length; i++) {
            var v = values[i];
            var open = parseFloat(v[0]);
            var close = parseFloat(v[1]);
            var low = parseFloat(v[2]);
            var high = parseFloat(v[3]);
            low = Math.min(low, open, close);
            high = Math.max(high, open, close);
            fixedValues.push([open, close, low, high]);
        }

        // 销毁旧图表
        var oldChart = echarts.getInstanceByDom(container);
        if (oldChart) oldChart.dispose();
        container.innerHTML = '';

        var chart = echarts.init(container);
        var option = {
            backgroundColor: 'transparent',
            tooltip: {
                trigger: 'axis',
                axisPointer: { type: 'shadow' },
                formatter: function(params) {
                    if (!params || !params.length) return '';
                    var idx = params[0].dataIndex;
                    var seriesData = chart.getOption().series[0].data;
                    if (!seriesData || idx >= seriesData.length) return '';
                    var d = seriesData[idx];
                    return params[0].axisValue + '<br/>' +
                           '开盘: ' + d[0] + '<br/>' +
                           '收盘: ' + d[1] + '<br/>' +
                           '最低: ' + d[2] + '<br/>' +
                           '最高: ' + d[3];
                }
            },
            xAxis: {
                type: 'category',
                data: dates,
                axisLabel: {
                    rotate: 0,
                    color: '#ffffff',
                    interval: 'auto',
                    formatter: function(value, index) {
                        return value.slice(0,7);
                    }
                }
            },
            yAxis: {
                scale: true,
                axisLabel: { color: '#ffffff' },
                name: '价格 (元)'
            },
            series: [{
                name: 'K线',
                type: 'candlestick',
                data: fixedValues,
                itemStyle: {
                    color: '#ef5350',
                    color0: '#26a69a',
                    borderColor: '#ef5350',
                    borderColor0: '#26a69a'
                }
            }],
            grid: { containLabel: true, backgroundColor: '#0e1220' },
            dataZoom: [
                {
                    type: 'inside',
                    start: 80,
                    end: 100,
                    zoomOnMouseWheel: true,
                    moveOnMouseMove: true,
                    moveOnMouseWheel: false
                }
            ]
        };
        chart.setOption(option, true);
    }

    // --------------------------------------------------------------
    // 个股详情页 K线数据获取（无弹窗）
    // --------------------------------------------------------------
    function fetchStockKline(code, callback) {
        if (!bridge) {
            var mock = generateMockKline(code);
            callback(mock.dates, mock.values);
            return;
        }
        
        bridge.get_kline_data(code, "2010-01-01", "2026-12-31").then(function(jsonStr) {
            var data = JSON.parse(jsonStr);
            
            if (data.error) {
                var mock = generateMockKline(code);
                callback(mock.dates, mock.values);
                return;
            }
            
            var dates = [];
            var values = [];
            
            if (data.dates && data.values && data.values.length > 0) {
                for (var i = 0; i < data.dates.length; i++) {
                    dates.push(data.dates[i]);
                    var v = data.values[i];
                    values.push([
                        parseFloat(v[0]),
                        parseFloat(v[1]),
                        parseFloat(v[2]),
                        parseFloat(v[3])
                    ]);
                }
            } else if (data.dates && data.opens && data.closes && data.lows && data.highs) {
                for (var i = 0; i < data.dates.length; i++) {
                    dates.push(data.dates[i]);
                    values.push([
                        parseFloat(data.opens[i]),
                        parseFloat(data.closes[i]),
                        parseFloat(data.lows[i]),
                        parseFloat(data.highs[i])
                    ]);
                }
            }
            
            if (dates.length > 0 && values.length > 0) {
                console.log("✅ 个股K线有效，渲染中...");
                callback(dates, values);
            } else {
                console.warn("⚠️ 无有效数据，使用模拟数据");
                var mock = generateMockKline(code);
                callback(mock.dates, mock.values);
            }
        }).catch(function(err) {
            console.error("获取个股K线失败:", err);
            var mock = generateMockKline(code);
            callback(mock.dates, mock.values);
        });
    }

    // --------------------------------------------------------------
    // 运行回测（支持日期范围）
    // --------------------------------------------------------------
    function runBacktest(code, startDate, endDate) {
        if (!bridge) {
            log("bridge 未连接，使用动态模拟信号");
            if (currentKlineDates.length === 0) {
                var mock = generateMockKline(code);
                currentKlineDates = mock.dates;
                currentKlineValues = mock.values;
            }
            var len = currentKlineDates.length;
            if (len > 20) {
                var buyDate = currentKlineDates[Math.floor(len * 0.3)];
                var sellDate = currentKlineDates[Math.floor(len * 0.7)];
                var buyIdx = currentKlineDates.indexOf(buyDate);
                var sellIdx = currentKlineDates.indexOf(sellDate);
                var buyPrice = currentKlineValues[buyIdx] ? currentKlineValues[buyIdx][1] : 12.35;
                var sellPrice = currentKlineValues[sellIdx] ? currentKlineValues[sellIdx][1] : 13.68;
                var mockSignals = [
                    { date: buyDate, code: code, type: 'buy', price: buyPrice, shares: 800 },
                    { date: sellDate, code: code, type: 'sell', price: sellPrice, shares: 800 }
                ];
                buyPoints = mockSignals.filter(s => s.type === 'buy');
                sellPoints = mockSignals.filter(s => s.type === 'sell');
                // 均线数据 mock（简单填充 0）
                var mockMaData = {
                    dates: currentKlineDates,
                    ma5: new Array(currentKlineDates.length).fill(0),
                    ma10: new Array(currentKlineDates.length).fill(0),
                    ma20: new Array(currentKlineDates.length).fill(0),
                    ma30: new Array(currentKlineDates.length).fill(0)
                };
                renderKlineWithSignals(currentKlineDates, currentKlineValues, buyPoints, sellPoints, mockMaData);
            } else {
                log("K线数据不足，无法生成模拟信号");
            }
            return;
        }
        log("运行回测: " + code + " 范围 " + startDate + " ~ " + endDate);
        bridge.run_backtest(code, startDate, endDate).then(function(jsonStr) {
            var res = JSON.parse(jsonStr);
            if (res.error) { log("回测出错: " + res.error); return; }
            if (res.success) {
                buyPoints = res.signals.filter(s => s.type === 'buy');
                sellPoints = res.signals.filter(s => s.type === 'sell');
                var maData = res.ma_data;
                log("回测完成，买入 " + buyPoints.length + " 卖出 " + sellPoints.length);
                if (currentKlineDates.length > 0) {
                    renderKlineWithSignals(currentKlineDates, currentKlineValues, buyPoints, sellPoints, maData);
                } else {
                    fetchAndRenderKline(code, startDate, endDate);
                }
            }
        }).catch(function(err) { log("回测请求失败: " + err); });
    }

    // --------------------------------------------------------------
    // 模拟K线数据生成（覆盖 2010-01-01 至 2026-12-31）
    // --------------------------------------------------------------
    function generateMockKline(code) {
        var startDate = new Date(2010, 0, 1);
        var endDate = new Date(2026, 11, 31);
        var dates = [], values = [], close = 12.0;
        var cur = new Date(startDate);
        while (cur <= endDate) {
            var day = cur.getDay();
            if (day !== 0 && day !== 6) {
                var dateStr = cur.toISOString().slice(0,10);
                var open = close;
                var change = (Math.random() - 0.5) * 1.2;
                var newClose = open + change;
                if (newClose < 8) newClose = 8.5;
                if (newClose > 28) newClose = 27;
                var high = Math.max(open, newClose) + Math.random() * 0.8;
                var low = Math.min(open, newClose) - Math.random() * 0.6;
                if (low < 7) low = 7.2;
                close = newClose;
                dates.push(dateStr);
                values.push([parseFloat(open.toFixed(2)), parseFloat(close.toFixed(2)), parseFloat(low.toFixed(2)), parseFloat(high.toFixed(2))]);
            }
            cur.setDate(cur.getDate() + 1);
        }
        return { dates: dates, values: values };
    }

                var logDiv = document.getElementById('runLogConsole');
                if (runBtn && logDiv) {
                    runBtn.onclick = function() {
                        logDiv.innerHTML += '<div>🚀 回测运行中... 基于当前策略产生买卖信号: 2026-01-05 买入 000001 800股@12.35, 2026-01-12 卖出 @13.68</div>';
                        logDiv.scrollTop = logDiv.scrollHeight;
                        currentTradeSignals.push({ date:'2026-01-20', code:'000001', type:'buy', price:13.20, shares:1000 });
                        alert("回测模拟完成，买卖点已记录，可前往买卖点成交图查看最新K线标识。");
                    };
                }
            }, 50);
        } else if (pageId === 'detail') {
            var profitTags = [ "策略收益 +23.5%", "基准收益 +12.1%", "阿尔法 0.18", "贝塔 0.92", "最大回撤 -8.2%" ];
            var tagHtml = profitTags.map(function(t) { var cls = profitClass(t); return '<span class="metric-tag ' + cls + '">' + t + '</span>'; }).join('');

                return '<tr><td>' + t.time + '</td><td class="stock-code-link" data-code="' + t.code + '">' + t.code + '</td><td>' + t.shares + '</td><td>' + t.price + '</td><td>' + t.mktValue + '</td></tr>';
            }).join('');
            container.innerHTML = `
                <div class="card">
                    <div class="card-title">📊 策略详情 (双均线示例)</div>
                    <div class="metric-row">${tagHtml}</div>
                    <div id="detailCurveContainer" style="height: 240px; width:100%; margin-bottom: 24px;"></div>

                    <table><thead><tr><th>成交时间</th><th>股票代码</th><th>成交数量</th><th>成交价格</th><th>当前市值(元)</th></tr></thead>
                    <tbody>${stockRows}</tbody></table>
                    </div></div>
                    <button id="gotoKlineBtn" style="margin-top: 16px;">🔍 查看买卖点成交图(K线)</button>
                </div>`;
            setTimeout(function() {
                drawDetailCurve();
                var gotoBtn = document.getElementById('gotoKlineBtn');
                if (gotoBtn) gotoBtn.onclick = function() { document.querySelector('.nav-item[data-page="kchart"]').click(); };

                contentPanel.addEventListener('click', function(e) {
                    var target = e.target;
                    if (target.classList.contains('stock-code-link')) {
                        var code = target.getAttribute('data-code');

        } else if (pageId === 'daily') {
            var rows = dailyHoldings.map(function(d) {

            container.innerHTML = `<div class="card"><div class="card-title">💰 每日持仓 & 收益明细</div>
                <table><thead><tr><th>日期</th><th>现金/资产(元)</th><th>日收益(元)</th><th>累计收益(元)</th></tr></thead>
                <tbody>${rows}</tbody></table></div>`;
        } else if (pageId === 'api') {
            container.innerHTML = `<div class="card"><div class="card-title">📘 API文档</div><div class="code-area">GET /api/backtest/list<br>POST /api/strategy/run<br>GET /api/stock/kline?code=000001<br>GET /api/trade/signals</div></div>`;
        } else if (pageId === 'settings') {
            container.innerHTML = `
                <div class="card">
                    <div class="card-title">⚙️ 设置说明</div>
                    <p style="color:#ffffff;">界面支持所有模块独立滑动，K线图买卖点完全基于回测产生的信号展示。后续可对接实盘数据。</p>
                </div>
                <div class="card">
                    <div class="card-title">👤 账号设置</div>
                    <div class="profile-avatar-upload">
                        <div class="preview" id="avatarPreview">${loadAvatarPreview()}</div>
                        <label class="file-upload-label" for="avatarInput">选择头像图片</label>
                        <input type="file" id="avatarInput" accept="image/*">
                        <button id="saveAvatarBtn">保存头像</button>
                    </div>
                </div>`;
            setTimeout(function() {
                var fileInput = document.getElementById('avatarInput');
                var preview = document.getElementById('avatarPreview');
                var saveBtn = document.getElementById('saveAvatarBtn');
                if (fileInput && preview && saveBtn) {
                    fileInput.addEventListener('change', function(e) {
                        var file = e.target.files[0];
                        if (file) {
                            var reader = new FileReader();
                            reader.onload = function(ev) {
                                preview.innerHTML = '<img src="' + ev.target.result + '" alt="头像预览">';
                                preview.dataset.tempDataUrl = ev.target.result;
                            };
                            reader.readAsDataURL(file);
                        }
                    });
                    saveBtn.addEventListener('click', function() {
                        var dataUrl = preview.dataset.tempDataUrl;
                        if (dataUrl) {
                            saveAvatarToStorage(dataUrl);
                            alert('头像已保存！');
                        } else {
                            alert('请先选择一张图片。');
                        }
                    });
                }
            }, 50);
        }
        document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
        var target = document.querySelector('.nav-item[data-page="' + pageId + '"]');
        if (target) target.classList.add('active');
    }

    // --------------------------------------------------------------
    // 辅助函数
    // --------------------------------------------------------------
    var backtestStrategies = [
        { id: 1, name: "双均线策略 (5,20)", profit: "+23.5%", code: "def initialize(context):\n    context.stock = '000001.SZ'\n    context.short_win = 5\n    context.long_win = 20\n\ndef handle_bar(context, bar_dict):\n    short_ma = history_bars(context.stock, context.short_win, '1d', 'close').mean()\n    long_ma = history_bars(context.stock, context.long_win, '1d', 'close').mean()\n    if short_ma > long_ma:\n        order_target_percent(context.stock, 1.0)\n        log.info('买入信号 at 价格:'+ str(bar_dict[context.stock].close))\n    elif short_ma < long_ma:\n        order_target_percent(context.stock, 0)\n        log.info('卖出信号')" },
        { id: 2, name: "RSI 超买超卖", profit: "+15.2%", code: "def initialize(context):\n    context.stock = '000858.SZ'\n    context.rsi_period = 14\n\ndef handle_bar(context, bar_dict):\n    rsi = RSI(context.stock, context.rsi_period)\n    if rsi < 30:\n        order_target_percent(context.stock, 0.8)\n        log.info('RSI 低吸买入')\n    elif rsi > 70:\n        order_target_percent(context.stock, 0)\n        log.info('RSI 超买卖出')" },
        { id: 3, name: "动量突破策略", profit: "+31.8%", code: "def initialize(context):\n    context.stock = '300750.SZ'\n    context.window = 20\n\ndef handle_bar(context, bar_dict):\n    prices = history_bars(context.stock, context.window, '1d', 'close')\n    if prices[-1] > max(prices[:-1]):\n        order_target_percent(context.stock, 1.0)\n        log.info('动量突破买入')\n    elif prices[-1] < min(prices[:-1]):\n        order_target_percent(context.stock, 0)" }
    ];

    var dailyHoldings = [
        { date: "2026-01-05", cash: "100,000", dailyProfit: "0.00", cumulative: "0.00" },
        { date: "2026-01-12", cash: "100,980", dailyProfit: "+980", cumulative: "+980" },

    ];

    var tradeStockLibrary = [
        { time: "2026-01-05 09:35", code: "000001", shares: 800, price: 12.35, mktValue: 9880 },
        { time: "2026-01-12 14:20", code: "000001", shares: 800, price: 13.68, mktValue: 10944 },
        { time: "2026-02-14 10:05", code: "000858", shares: 200, price: 158.2, mktValue: 31640 }
    ];

    var mockTradeSignals = [
        { date: '2026-01-05', code: '000001', type: 'buy', price: 12.35, shares: 800 },
        { date: '2026-01-12', code: '000001', type: 'sell', price: 13.68, shares: 800 },
        { date: '2026-01-20', code: '000001', type: 'buy', price: 13.20, shares: 1000 },
        { date: '2026-02-01', code: '000001', type: 'sell', price: 14.55, shares: 1000 },
        { date: '2026-02-14', code: '000858', type: 'buy', price: 158.2, shares: 200 },
        { date: '2026-02-28', code: '000858', type: 'sell', price: 172.3, shares: 200 },
        { date: '2026-03-10', code: '300750', type: 'buy', price: 185.6, shares: 100 },
        { date: '2026-03-25', code: '300750', type: 'sell', price: 210.8, shares: 100 }
    ];

    var currentTradeSignals = mockTradeSignals.slice();

    function profitClass(str) {
        if (!str) return '';
        if (str.startsWith('+')) return 'profit-positive';
        if (str.startsWith('-')) return 'profit-negative';
        return '';
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function drawDetailCurve() {
        var dom = document.getElementById('detailCurveContainer');
        if (dom && typeof echarts !== 'undefined') {
            var chart = echarts.init(dom);
            chart.setOption({ tooltip: {trigger:'axis'}, xAxis:{data:['1月','2月','3月'], axisLabel:{color:'#ffffff'}}, yAxis:{name:'收益率%', axisLabel:{color:'#ffffff'}}, series:[{type:'line', data:[0,12.3,23.5], name:'策略收益曲线', lineStyle:{color:'#4f7eff'}}]});
        }
    }

    function loadAvatarPreview() {
        var saved = localStorage.getItem('user_avatar');
        if (saved) { return '<img src="' + saved + '" alt="头像预览">'; }
        return '📷';
    }

    function saveAvatarToStorage(dataUrl) {
        localStorage.setItem('user_avatar', dataUrl);
        var icon = document.getElementById('navAvatarIcon');
        if (icon) icon.innerHTML = '<img src="' + dataUrl + '" alt="头像">';
    }

    document.addEventListener('DOMContentLoaded', function() {
        var saved = localStorage.getItem('user_avatar');
        if (saved) {
            var icon = document.getElementById('navAvatarIcon');
            if (icon) icon.innerHTML = '<img src="' + saved + '" alt="头像">';
        }
    });

    document.querySelectorAll('.nav-item').forEach(function(item) {
        item.addEventListener('click', function(e) {
            var pageId = item.getAttribute('data-page');
            if (pageId === 'kchart') autoRunBacktest = false;
            loadPage(pageId);
        });
    });

    loadPage('history');
</script>
