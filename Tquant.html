<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tquant 量化工作站 | 策略回测 + K线买卖点</title>
    <!-- ECharts 核心库 -->
    <script src="echarts.min.js"></script>
    <!-- QWebChannel -->
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, '微软雅黑', sans-serif;
            background: #0e1118;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }

        .app-window {
            width: 1480px;
            max-width: 96vw;
            height: 92vh;
            background: #11141f;
            border-radius: 20px;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #2a2f42;
        }

        .title-bar {
            background: #0c0f18;
            padding: 10px 24px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid #202436;
        }
        .logo-text {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
        }
        .logo-text span {
            color: #5f8eff;
        }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .nav-sidebar {
            width: 210px;
            background: #0a0d16;
            border-right: 1px solid #202436;
            display: flex;
            flex-direction: column;
            padding: 20px 10px;
            gap: 6px;
            overflow-y: auto;
        }
        .nav-item {
            padding: 10px 14px;
            border-radius: 12px;
            color: #ffffff;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-item:hover {
            background: #1a2135;
            color: #ffffff;
        }
        .nav-item.active {
            background: #2c3e66;
            color: #ffffff;
        }
        .nav-item .avatar-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background: #2c3e66;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .nav-item .avatar-icon img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .content-panel {
            flex: 1;
            background: #0f1220;
            overflow-y: auto;
            padding: 20px 24px;
            color: #ffffff;
        }

        .card {
            background: #151c2c;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #242a40;
            color: #ffffff;
        }
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            border-left: 4px solid #4f7eff;
            padding-left: 14px;
            margin-bottom: 18px;
        }

        .kline-container {
            width: 100%;
            height: 460px !important;
            min-height: 460px;
            flex-shrink: 0;
            background: #0e1220;
            border-radius: 20px;
            margin: 10px 0;
        }

        .legend-sign {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin: 12px 0;
            font-size: 13px;
            color: #ffffff;
        }
        .buy-point {
            display: inline-block;
            width: 14px;
            height: 14px;
            background: #ff4d4f;
            border-radius: 50%;
            margin-right: 4px;
        }
        .sell-point {
            display: inline-block;
            width: 14px;
            height: 14px;
            background: #52c41a;
            border-radius: 50%;
            margin-right: 4px;
        }

        .metric-row {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin: 16px 0;
            align-items: center;
            min-width: 0;
        }
        /* FIX: 强制固定表单控件宽度，阻止拉伸 */
        .metric-row select,
        .metric-row input[type="date"] {
            width: 130px !important;
            min-width: 130px !important;
            max-width: 130px !important;
            flex: none !important;
            flex-shrink: 0 !important;
            flex-grow: 0 !important;
            height: 34px !important;
            box-sizing: border-box !important;
            overflow: hidden !important;
            text-overflow: ellipsis !important;
            white-space: nowrap !important;
        }
        .metric-row input[type="date"] {
            width: 145px !important;
            min-width: 145px !important;
            max-width: 145px !important;
        }
        .metric-row > * {
            flex-shrink: 0;
            flex-grow: 0;
        }
        select option {
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .metric-tag {
            background: #1f273f;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            color: #ffffff;
        }
        .profit-positive { color: #ff4d4f !important; }
        .profit-negative { color: #52c41a !important; }

        button {
            background: #2d3a5e;
            border: none;
            padding: 6px 18px;
            border-radius: 30px;
            color: #ffffff;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: #3f5080;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            color: #ffffff;
        }
        th, td {
            padding: 10px 6px;
            text-align: left;
            border-bottom: 1px solid #2a314a;
            color: #ffffff;
        }
        th {
            color: #ffffff;
            font-weight: 500;
        }
        .code-area {
            background: #0b0e1a;
            font-family: 'Fira Code', monospace;
            padding: 16px;
            border-radius: 16px;
            white-space: pre-wrap;
            font-size: 13px;
            color: #ffffff;
        }
        textarea {
            width: 100%;
            background: #0b0e1a;
            border: 1px solid #2a3145;
            border-radius: 16px;
            color: #ffffff;
            font-family: 'Fira Code', monospace;
            padding: 14px;
            font-size: 13px;
            resize: vertical;
        }
        .log-box {
            background: #0c0f18;
            border-radius: 16px;
            padding: 12px;
            height: 130px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            margin-top: 12px;
            color: #ffffff;
        }
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #1a2130;
        }
        ::-webkit-scrollbar-thumb {
            background: #3f4a6b;
        }

        .profile-avatar-upload {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .profile-avatar-upload .preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #4f7eff;
            overflow: hidden;
            background: #2a3145;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        .profile-avatar-upload .preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .account-cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .account-card {
            background: #1a2135;
            border-radius: 16px;
            padding: 20px;
            flex: 1;
            min-width: 160px;
            text-align: center;
            border: 1px solid #2a314a;
        }
        .account-card .value {
            font-size: 24px;
            font-weight: 600;
            margin-top: 8px;
        }
        .account-card .label {
            font-size: 14px;
            color: #9aa9cc;
        }
        input[type="file"] {
            display: none;
        }
        .file-upload-label {
            background: #2d3a5e;
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
        }
        .trade-input-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin: 12px 0;
        }
        .trade-input-row input, .trade-input-row select {
            background: #1e253b;
            border: 1px solid #323d5a;
            padding: 8px 14px;
            border-radius: 30px;
            color: #ffffff;
            font-size: 13px;
        }
        .stock-code-link {
            cursor: pointer;
            text-decoration: underline;
            color: #5f8eff;
        }
        .stock-code-link:hover {
            color: #8ab4f8;
        }
        /* 个股详情页搜索区 */
        .stock-search-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
        }
        .stock-search-row input {
            background: #1e253b;
            border: 1px solid #323d5a;
            padding: 8px 14px;
            border-radius: 30px;
            color: #ffffff;
            font-size: 13px;
            flex: 1;
        }
        /* ----------  通用 select 宽度限制 ---------- */
        select {
            min-width: 0 !important;
            max-width: 140px;
            flex-shrink: 0;
            height: 34px;
            line-height: 34px;
            box-sizing: border-box;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        /* ----------  修复下拉框固定宽度（使用 !important 覆盖全局） ---------- */
        .metric-row select#stockSelectorKline,
        select#stockSelectorKline {
            width: 130px !important;
            min-width: 130px !important;
            max-width: 130px !important;
            flex: none !important;
            flex-shrink: 0 !important;
        }
        /* ----------  可滚动表格容器 ---------- */
        .scrollable-table {
            max-height: 300px;
            overflow-y: auto;
        }
        /* ----------  日期输入框样式 ---------- */
        input[type="date"] {
            background: #1e253b;
            border: 1px solid #323d5a;
            padding: 6px 10px;
            border-radius: 30px;
            color: #ffffff;
            font-size: 13px;
            width: auto;
            min-width: 130px;
            max-width: 160px;
            flex-shrink: 0;
            height: 34px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
<!-- Bridge 状态指示器 (固定在右上角) -->
<div id="bridgeStatus" style="position:fixed; top:10px; right:10px; background:#333; padding:8px 15px; border-radius:8px; z-index:9999; font-size:12px; font-family:monospace; box-shadow:0 2px 8px rgba(0,0,0,0.3);">
    🔌 Bridge: 检测中...
</div>

<div class="app-window">
    <div class="title-bar">
        <div class="logo-text">Tquant <span>量化工作站</span> | 策略回测·K线买卖点</div>
        <div style="font-size:12px; color:#ffffff;">专业回测引擎</div>
    </div>
    <div class="main-layout">
        <div class="nav-sidebar">
            <div class="nav-item" data-page="profile">
                <span class="avatar-icon" id="navAvatarIcon">👤</span>
                个人中心
            </div>
            <div class="nav-item active" data-page="history">📁 历史回测</div>
            <div class="nav-item" data-page="strategy">💻 策略代码</div>
            <div class="nav-item" data-page="detail">📊 策略详情</div>
            <div class="nav-item" data-page="daily">💰 每日持仓&amp;收益</div>
            <div class="nav-item" data-page="kchart">📈 买卖点成交图(K线)</div>
            <div class="nav-item" data-page="stock">📉 个股详情</div>
            <div class="nav-item" data-page="api">📘 API文档</div>
            <div class="nav-item" data-page="settings">⚙️ 设置说明</div>
        </div>

        <div class="content-panel" id="dynamicContent">
            <!-- 动态渲染 -->
        </div>
    </div>
</div>

<script>
    // ... (full JavaScript content, unchanged from previous)
</script>
</body>
</html>
