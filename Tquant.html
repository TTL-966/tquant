<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tquant 量化工作站 | 策略回测 + K线买卖点</title>
    <!-- ECharts 核心库 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <!-- QWebChannel -->
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, '微软雅黑', sans-serif;
            background: #0e1118;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }

        .app-window {
            width: 1480px;
            max-width: 96vw;
            height: 92vh;
            background: #11141f;
            border-radius: 20px;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #2a2f42;
        }

        .title-bar {
            background: #0c0f18;
            padding: 10px 24px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid #202436;
        }
        .logo-text {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
        }
        .logo-text span {
            color: #5f8eff;
        }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .nav-sidebar {
            width: 210px;
            background: #0a0d16;
            border-right: 1px solid #202436;
            display: flex;
            flex-direction: column;
            padding: 20px 10px;

            overflow-y: auto;

        .nav-item {
            padding: 10px 14px;
            border-radius: 12px;

            align-items: center;

        }
        .nav-item:hover {
            background: #1a2135;
            color: #ffffff;
        }
        .nav-item.active {
            background: #2c3e66;
            color: #ffffff;
        }
        .nav-item .avatar-icon {
            width: 40px;

        .card {

            border: 1px solid #242a40;

        }
        .card-title {
            font-size: 18px;
            font-weight: 600;

        .kline-container {
            width: 100%;
            height: 460px !important;

        .legend-sign {
            display: inline-flex;

        .buy-point {

        .sell-point {
            display: inline-block;

        .metric-row {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin: 16px 0;
        }
        .metric-tag {
            background: #1f273f;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            color: #ffffff;
        }
        .profit-positive { color: #ff4d4f !important; }
        .profit-negative { color: #52c41a !important; }

        button {
            background: #2d3a5e;
            border: none;
            padding: 6px 18px;
            border-radius: 30px;
            color: #ffffff;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: #3f5080;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            color: #ffffff;
        }
        th, td {
            padding: 10px 6px;
            text-align: left;
            border-bottom: 1px solid #2a314a;
            color: #ffffff;
        }
        th {
            color: #ffffff;
            font-weight: 500;
        }
        .code-area {
            background: #0b0e1a;
            font-family: 'Fira Code', monospace;
            padding: 16px;
            border-radius: 16px;
            white-space: pre-wrap;
            font-size: 13px;
            color: #ffffff;
        }
        textarea {
            width: 100%;
            background: #0b0e1a;
            border: 1px solid #2a3145;
            border-radius: 16px;
            color: #ffffff;
            font-family: 'Fira Code', monospace;
            padding: 14px;
            font-size: 13px;
            resize: vertical;
        }
        .log-box {
            background: #0c0f18;
            border-radius: 16px;
            padding: 12px;
            height: 130px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            margin-top: 12px;
            color: #ffffff;
        }
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #1a2130;
        }
        ::-webkit-scrollbar-thumb {
            background: #3f4a6b;
        }

        .profile-avatar-upload {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .profile-avatar-upload .preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #4f7eff;
            overflow: hidden;
            background: #2a3145;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        .profile-avatar-upload .preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .account-cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .account-card {
            background: #1a2135;
            border-radius: 16px;
            padding: 20px;
            flex: 1;
            min-width: 160px;
            text-align: center;
            border: 1px solid #2a314a;
        }
        .account-card .value {
            font-size: 24px;
            font-weight: 600;
            margin-top: 8px;
        }
        .account-card .label {
            font-size: 14px;
            color: #9aa9cc;
        }
        input[type="file"] {
            display: none;
        }
        .file-upload-label {
            background: #2d3a5e;
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
        }
        .trade-input-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin: 12px 0;
        }
        .trade-input-row input, .trade-input-row select {
            background: #1e253b;
            border: 1px solid #323d5a;
            padding: 8px 14px;
            border-radius: 30px;
            color: #ffffff;
            font-size: 13px;
        }
        .stock-code-link {
            cursor: pointer;
            text-decoration: underline;
            color: #5f8eff;
        }
        .stock-code-link:hover {
            color: #8ab4f8;
        }
        /* 个股详情页搜索区 */
        .stock-search-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
        }
        .stock-search-row input {
            background: #1e253b;
            border: 1px solid #323d5a;
            padding: 8px 14px;
            border-radius: 30px;
            color: #ffffff;
            font-size: 13px;
            flex: 1;
        }
        /* ----------  新增通用 select 宽度限制 ---------- */
        select {
            max-width: 240px;
        }
        /* ----------  可滚动表格容器 ---------- */
        .scrollable-table {
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
<!-- Bridge 状态指示器 (固定在右上角) -->
<div id="bridgeStatus" style="position:fixed; top:10px; right:10px; background:#333; padding:8px 15px; border-radius:8px; z-index:9999; font-size:12px; font-family:monospace; box-shadow:0 2px 8px rgba(0,0,0,0.3);">
    🔌 Bridge: 检测中...
</div>

<div class="app-window">
    <div class="title-bar">
        <div class="logo-text">Tquant <span>量化工作站</span> | 策略回测·K线买卖点</div>
        <div style="font-size:12px; color:#ffffff;">专业回测引擎</div>
    </div>
    <div class="main-layout">
        <div class="nav-sidebar">
            <div class="nav-item" data-page="profile">
                <span class="avatar-icon" id="navAvatarIcon">👤</span>
                个人中心
            </div>
            <div class="nav-item active" data-page="history">📁 历史回测</div>
            <div class="nav-item" data-page="strategy">💻 策略代码</div>
            <div class="nav-item" data-page="detail">📊 策略详情</div>
            <div class="nav-item" data-page="daily">💰 每日持仓&amp;收益</div>
            <div class="nav-item" data-page="kchart">📈 买卖点成交图(K线)</div>
            <div class="nav-item" data-page="stock">📉 个股详情</div>
            <div class="nav-item" data-page="api">📘 API文档</div>
            <div class="nav-item" data-page="settings">⚙️ 设置说明</div>
        </div>

        <div class="content-panel" id="dynamicContent">
            <!-- 动态渲染 -->
        </div>
    </div>
</div>

<!-- K线调试面板 -->
<div id="klineDebug" style="position:fixed; bottom:10px; left:10px; background:#1a1a2e; padding:8px 12px; border-radius:8px; z-index:9999; font-size:11px; font-family:monospace; border:1px solid #4f7eff; max-width:350px; backdrop-filter:blur(5px);">
    <div style="font-weight:bold; margin-bottom:5px;">📊 K线调试</div>
    <div id="debugStatus">状态: 等待页面加载...</div>
    <div id="debugData">数据: 无</div>
    <div id="debugRender">渲染: 未执行</div>
    <button id="forceRenderBtn" style="margin-top:8px; background:#2d3a5e; border:none; padding:4px 12px; border-radius:4px; color:white; cursor:pointer;">强制渲染测试</button>
    <button id="testFetchBtn" style="margin-top:8px; margin-left:8px; background:#2d3a5e; border:none; padding:4px 12px; border-radius:4px; color:white; cursor:pointer;">手动获取数据</button>
</div>

<script>
    // Bridge 状态更新
    setTimeout(function() {
        var statusDiv = document.getElementById('bridgeStatus');
        if (typeof bridge !== 'undefined' && bridge !== null) {
            statusDiv.innerHTML = '🔌 Bridge: ✅ 已连接';
            statusDiv.style.background = '#1a5a2a';
        } else {
            statusDiv.innerHTML = '🔌 Bridge: ❌ 未连接';
            statusDiv.style.background = '#5a2a2a';
        }
    }, 1000);

    // --------------------------------------------------------------
    // 全局变量 & 通信日志
    // --------------------------------------------------------------
    var bridge = null;
    var klineChart = null;
    var stockChart = null;          // 个股详情页K线图表实例
    var currentStockCode = "000001";
    var buyPoints = [];
    var sellPoints = [];
    var bridgeReady = false;
    var pendingCallbacks = [];
    var autoRunBacktest = false;

    function log(msg) {
        console.log("[Tquant]", msg);
    }

    function onBridgeReady(callback) {
        if (bridgeReady && callback) {
            callback();
        } else if (callback) {
            pendingCallbacks.push(callback);
        }
    }

    // --------------------------------------------------------------
    // 建立 QWebChannel
    // --------------------------------------------------------------
    document.addEventListener("DOMContentLoaded", function() {
        if (typeof QWebChannel !== 'undefined' && typeof qt !== 'undefined' && qt.webChannelTransport) {
            new QWebChannel(qt.webChannelTransport, function(channel) {
                bridge = channel.objects.bridge;
                bridgeReady = true;
                log("QWebChannel 已建立，bridge.ping = " + typeof bridge.ping);
                pendingCallbacks.forEach(function(cb) { cb(); });
                pendingCallbacks = [];

                if (typeof bridge.ping === 'function') {
                    bridge.ping().then(function(reply) {
                        log("ping 响应: " + reply);
                    }).catch(function(err) {
                        log("ping 失败: " + err);
                    });
                }

                if (bridge) {
                    fetchAndRenderKline(currentStockCode);
                }
            });
        } else {
            log("QWebChannel 环境不可用（qt.webChannelTransport 未定义），使用模拟数据。");
        }
    });

    // --------------------------------------------------------------
    // 跳转函数
    // --------------------------------------------------------------
    function navigateToKline(code) {
        currentStockCode = code;
        autoRunBacktest = true;
        document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
        var target = document.querySelector('.nav-item[data-page="kchart"]');
        if (target) target.classList.add('active');
        loadPage('kchart');
    }

    // --------------------------------------------------------------
    // K线数据获取与渲染（含买卖点）
    // --------------------------------------------------------------
    function fetchAndRenderKline(code) {
        if (!bridge) {
            log("bridge 未就绪，使用模拟数据");
            if (typeof generateMockKline === 'function') {
                var mock = generateMockKline(code);
                currentKlineDates = mock.dates;
                currentKlineValues = mock.values;
                renderKlineWithSignals(mock.dates, mock.values, buyPoints, sellPoints);
            }
            return;
        }
        log("请求 K线数据: " + code);
        bridge.get_kline_data(code).then(function(jsonStr) {
            var data = JSON.parse(jsonStr);
            if (data.error) { log("后端错误: " + data.error); return; }
            // 【修正】兼容处理：如果后端没有直接提供 values，则从 opens/closes/lows/highs 构造
            if (data.dates && !data.values && data.opens && data.highs && data.lows && data.closes) {
                data.values = data.dates.map(function(_, i) {
                    return [data.opens[i], data.closes[i], data.lows[i], data.highs[i]];
                });
            }
            if (!data.dates || !data.values) { log("数据格式错误"); return; }
            currentKlineDates = data.dates;
            currentKlineValues = data.values;
            renderKlineWithSignals(data.dates, data.values, buyPoints, sellPoints);
        }).catch(function(err) { log("请求失败: " + err); });
    }

    var currentKlineDates = [];
    var currentKlineValues = [];

    // --------------------------------------------------------------
    // 修复后的 renderKlineWithSignals —— 增强调试输出
    // --------------------------------------------------------------
    function renderKlineWithSignals(dates, values, buyPts, sellPts) {
        console.log("=== renderKlineWithSignals 被调用 ===");
        console.log("dates 数量:", dates ? dates.length : 0);
        console.log("values 数量:", values ? values.length : 0);
        
        var dom = document.getElementById('klineMainChart');
        console.log("klineMainChart 容器:", dom);
        
        if (!dom) {
            console.error('❌ 找不到 klineMainChart 容器');
            var debugRender = document.getElementById('debugRender');
            if (debugRender) debugRender.innerHTML = '渲染: ❌ 找不到容器';
            return;
        }
        
        // 检查容器尺寸
        var rect = dom.getBoundingClientRect();
        console.log("容器尺寸:", rect.width, "x", rect.height);
        if (rect.width === 0 || rect.height === 0) {
            console.warn("容器尺寸为 0，可能被隐藏");
            // 设置一个默认高度
            dom.style.height = "460px";
            dom.style.width = "100%";
        }
        
        if (typeof echarts === 'undefined') {
            console.error('❌ ECharts 未加载');
            var debugRender = document.getElementById('debugRender');
            if (debugRender) debugRender.innerHTML = '渲染: ❌ ECharts 未加载';
            return;
        }
        
        // 先销毁旧实例
        var existingChart = echarts.getInstanceByDom(dom);
        if (existingChart) {
            existingChart.dispose();
            console.log("已销毁旧图表实例");
        }
        
        // 创建新图表
        var chart = echarts.init(dom);
        console.log("ECharts 实例创建成功");
        
        var option = {
            backgroundColor: 'transparent',
            title: { 
                text: 'K线图', 
                left: 'center', 
                textStyle: { color: '#ffffff' } 
            },
            tooltip: { 
                trigger: 'axis',
                axisPointer: { type: 'shadow' }
            },
            xAxis: { 
                data: dates, 
                type: 'category',
                axisLabel: { rotate: 45, color: '#ffffff' }
            },
            yAxis: { 
                scale: true, 
                axisLabel: { color: '#ffffff' },
                name: '价格 (元)'
            },
            series: [{
                name: 'K线',
                type: 'candlestick',
                data: values,
                itemStyle: {
                    color: '#ef5350',
                    color0: '#26a69a',
                    borderColor: '#ef5350',
                    borderColor0: '#26a69a'
                }
            }],
            legend: { 
                data: ['K线'], 
                textStyle: { color: '#ffffff' }, 
                left: 'left' 
            },
            grid: { 
                containLabel: true, 
                backgroundColor: '#0e1220' 
            }
        };
        
        chart.setOption(option);
        console.log("图表设置完成");
        
        // 强制调整大小
        setTimeout(function() {
            chart.resize();
            console.log("图表已调整大小");
        }, 100);
        
        var debugRender = document.getElementById('debugRender');
        if (debugRender) debugRender.innerHTML = '渲染: ✅ 已完成，图表实例已创建';
    }

    // 个股详情页专用：渲染简单K线（不含买卖点）
    function renderStockKline(containerId, dates, values) {
        var dom = document.getElementById(containerId);
        if (!dom) return;
        var existingChart = echarts.getInstanceByDom(dom);
        if (existingChart) existingChart.dispose();
        if (typeof echarts !== 'undefined') {
            var chart = echarts.init(dom);
            var option = {
                backgroundColor: 'transparent',
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, formatter: function(params) { var res = params[0].axisValue + '<br/>'; var d = params[0].data; res += '开盘: ' + d[0] + '<br/>收盘: ' + d[1] + '<br/>最低: ' + d[2] + '<br/>最高: ' + d[3]; return res; } },
                xAxis: { type: 'category', data: dates, axisLabel: { rotate: 45, color: '#ffffff' } },
                yAxis: { scale: true, axisLabel: { color: '#ffffff' }, name: '价格 (元)' },
                series: [
                    { name: 'K线', type: 'candlestick', data: values, itemStyle: { color: '#ef5350', color0: '#26a69a', borderColor: '#ef5350', borderColor0: '#26a69a' } }
                ],
                grid: { containLabel: true, backgroundColor: '#0e1220' }
            };
            chart.setOption(option);
        }
    }

    // --------------------------------------------------------------
    // 运行回测
    // --------------------------------------------------------------
    function runBacktest(code) {
        if (!bridge) {
            log("bridge 未连接，使用模拟信号");
            var mockSignals = [ { date: '2026-01-05', code: code, type: 'buy', price: 12.35, shares: 800 }, { date: '2026-01-12', code: code, type: 'sell', price: 13.68, shares: 800 } ];
            buyPoints = mockSignals.filter(s => s.type === 'buy');
            sellPoints = mockSignals.filter(s => s.type === 'sell');
            if (currentKlineDates.length > 0) renderKlineWithSignals(currentKlineDates, currentKlineValues, buyPoints, sellPoints);
            else fetchAndRenderKline(code);
            return;
        }
        log("运行回测: " + code);
        bridge.run_backtest(code).then(function(jsonStr) {
            var res = JSON.parse(jsonStr);
            if (res.error) { log("回测出错: " + res.error); return; }
            if (res.success) {
                buyPoints = res.signals.filter(s => s.type === 'buy');
                sellPoints = res.signals.filter(s => s.type === 'sell');
                log("回测完成，买入 " + buyPoints.length + " 卖出 " + sellPoints.length);
                if (currentKlineDates.length > 0) renderKlineWithSignals(currentKlineDates, currentKlineValues, buyPoints, sellPoints);
                else fetchAndRenderKline(code);
            }
        }).catch(function(err) { log("回测请求失败: " + err); });
    }

    // --------------------------------------------------------------
    // 模拟K线数据生成
    // --------------------------------------------------------------
    function generateMockKline(code) {
        var baseDate = new Date(2026, 0, 1);
        var dates = [], values = [], close = 12.0;
        for (var i=0; i<60; i++) {
            var date = new Date(baseDate); date.setDate(baseDate.getDate()+i);
            var dateStr = date.toISOString().slice(0,10);
            var open = close;
            var change = (Math.random() - 0.5)*1.2;
            var newClose = open + change;
            if (newClose < 8) newClose = 8.5;
            if (newClose > 28) newClose = 27;
            var high = Math.max(open, newClose) + Math.random()*0.8;
            var low = Math.min(open, newClose) - Math.random()*0.6;
            if (low < 7) low = 7.2;
            close = newClose;
            dates.push(dateStr);
            values.push([parseFloat(open.toFixed(2)), parseFloat(close.toFixed(2)), parseFloat(low.toFixed(2)), parseFloat(high.toFixed(2))]);
        }
        return { dates: dates, values: values };
    }

    // 辅助函数：获取K线数据（用于个股详情页）
    function fetchStockKline(code, callback) {
        if (!bridge) {
            var mock = generateMockKline(code);
            callback(mock.dates, mock.values);
            return;
        }
        bridge.get_kline_data(code).then(function(jsonStr) {
            var data = JSON.parse(jsonStr);
            if (data.error) { var mock = generateMockKline(code); callback(mock.dates, mock.values); return; }
            // 兼容处理：如果后端没有 values，从 opens/closes/lows/highs 构造
            if (data.dates && !data.values && data.opens && data.highs && data.lows && data.closes) {
                data.values = data.dates.map(function(_, i) {
                    return [data.opens[i], data.closes[i], data.lows[i], data.highs[i]];
                });
            }
            if (!data.dates || !data.values) {

    }

    document.addEventListener('DOMContentLoaded', function() {
        var saved = localStorage.getItem('user_avatar');
        if (saved) {
            var icon = document.getElementById('navAvatarIcon');
            if (icon) icon.innerHTML = '<img src="' + saved + '" alt="头像">';
        }
    });

    document.querySelectorAll('.nav-item').forEach(function(item) {
        item.addEventListener('click', function(e) {
            var pageId = item.getAttribute('data-page');
            if (pageId === 'kchart') autoRunBacktest = false;
            loadPage(pageId);
        });
    });

    loadPage('history');

    // ---------- 调试面板脚本 ----------
    (function() {
        var debugStatus = document.getElementById('debugStatus');
        var debugData = document.getElementById('debugData');
        var debugRender = document.getElementById('debugRender');

        function updateStatus(msg) { if (debugStatus) debugStatus.textContent = msg; }
        function updateData(msg) { if (debugData) debugData.textContent = msg; }
        function updateRender(msg) { if (debugRender) debugRender.textContent = msg; }

        updateStatus('状态: 脚本已加载，等待 bridge...');

        var checkBridge = setInterval(function() {
            if (typeof bridge !== 'undefined' && bridge !== null) {
                updateStatus('状态: ✅ bridge 已连接');
                clearInterval(checkBridge);
            } else if (window.bridge !== undefined && window.bridge !== null) {
                bridge = window.bridge;
                updateStatus('状态: ✅ bridge 已连接');
                clearInterval(checkBridge);
            }
        }, 500);

        window.fetchAndRenderKline = function(code) {
            updateStatus('状态: 🔄 正在获取 ' + code + '...');
            updateData('数据: 请求中...');
            updateRender('渲染: 等待数据');

            var b = bridge || window.bridge;
            if (!b) {
                updateStatus('状态: ❌ bridge 未连接');
                return;
            }

            b.get_kline_data(code).then(function(jsonStr) {
                updateStatus('状态: ✅ 收到数据');
                updateData('原始数据长度: ' + jsonStr.length);

                var data = JSON.parse(jsonStr);
                if (data.error) {
                    updateStatus('状态: ❌ ' + data.error);
                    return;
                }

                var datesLen = data.dates ? data.dates.length : 0;
                var valuesLen = data.values ? data.values.length : 0;
                updateData('数据: dates=' + datesLen + ', values=' + valuesLen);

                if (datesLen > 0 && valuesLen > 0) {
                    updateData('数据: 示例日期 ' + data.dates[0] + ', 值 [' + data.values[0].join(',') + ']');

                    if (typeof renderKlineWithSignals === 'function') {
                        renderKlineWithSignals(data.dates, data.values, [], []);
                        updateRender('渲染: ✅ 已调用 renderKlineWithSignals');
                    } else {
                        updateRender('渲染: ❌ renderKlineWithSignals 函数不存在');
                    }
                } else {
                    updateData('数据: ❌ 无效数据格式');
                }
            }).catch(function(err) {
                updateStatus('状态: ❌ 请求失败: ' + err.message);
                updateData('错误: ' + err);
            });
        };

        // 强制渲染测试
        document.getElementById('forceRenderBtn')?.addEventListener('click', function() {
            var testDates = ['2026-01-01', '2026-01-02', '2026-01-03', '2026-01-04', '2026-01-05'];
            var testValues = [
                [12.00, 12.50, 11.80, 12.60],
                [12.50, 13.00, 12.30, 13.20],
                [13.00, 12.80, 12.60, 13.10],
                [12.80, 13.50, 12.70, 13.60],
                [13.50, 14.00, 13.20, 14.10]
            ];
            if (typeof renderKlineWithSignals === 'function') {
                renderKlineWithSignals(testDates, testValues, [], []);
                updateRender('渲染: ✅ 强制渲染完成（测试数据）');
                updateStatus('状态: 强制渲染完成');
            } else {
                updateRender('渲染: ❌ renderKlineWithSignals 不存在');
            }
        });

        // 手动获取数据
        document.getElementById('testFetchBtn')?.addEventListener('click', function() {
            var code = '000001';
            var b = bridge || window.bridge;
            if (!b) {
                updateStatus('状态: ❌ bridge 未连接');
                return;
            }
            updateStatus('状态: 手动获取 ' + code + '...');
            b.get_kline_data(code).then(function(jsonStr) {
                updateStatus('状态: ✅ 收到数据，长度 ' + jsonStr.length);
                try {
                    var data = JSON.parse(jsonStr);
                    updateData('解析: dates=' + (data.dates ? data.dates.length : 0) + ', values=' + (data.values ? data.values.length : 0));
                    if (data.dates && data.dates.length > 0) {
                        updateData('示例: ' + data.dates[0] + ' ' + JSON.stringify(data.values[0]));
                    }
                } catch(e) {
                    updateData('解析错误: ' + e.message);
                }
            }).catch(function(err) {
                updateStatus('状态: ❌ 失败');
                updateData('错误: ' + err);
            });
        });
    })();
</script>
</body>
</html>
